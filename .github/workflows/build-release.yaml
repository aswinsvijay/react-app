name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write  # This allows GITHUB_TOKEN to create releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22'

      - name: Check node version
        run: node -v

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Configure git for pushing to dist branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add and push dist folder to dist branch
        run: |
          mv ./dist ../dist
          git fetch origin dist:dist || git checkout --orphan dist
          git switch dist || git checkout dist
          rm -rf ./dist
          mv ../dist ./dist
          git add ./dist
          git commit -m "Update dist" || echo "No changes to commit"
          git push origin dist
        working-directory: .

      - name: Test
        run: node -v
