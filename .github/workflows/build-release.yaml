name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write  # This allows GITHUB_TOKEN to create releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22'

      - name: Check node version
        run: node -v

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Generate safe tag name
        id: tagname
        run: |
          SHORT_SHA=$(git rev-parse --short=8 HEAD)
          DATE=$(date +'%Y%m%d%H%M%S')
          TAG_NAME="release-${DATE}-${SHORT_SHA}"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tagname.outputs.tag_name }}
          name: Release ${{ steps.tagname.outputs.tag_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Folder to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/**
          tag: ${{ steps.tagname.outputs.tag_name }}
          overwrite: true
          file_glob: true
